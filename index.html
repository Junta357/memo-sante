<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fdf6ec">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mémo Santé">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
<link rel="apple-touch-icon" href="./icons/apple-touch-180.png">
<title>Mémo Santé</title>
<style>
  :root{
    /* Palette douce & chaleureuse — fond crème, orange doux, tons discrets */
    --bg:#fdf6ec;            /* crème */
    --card:#ffffff;          /* cartes blanches */
    --card2:#faf1e2;         /* crème plus chaud */
    --txt:#3d342a;           /* brun foncé doux */
    --mut:#8a7d6b;           /* brun gris */
    --line:#ece0cb;          /* beige clair */
    --acc:#e0915a;           /* orange chaleureux */
    --acc2:#c97a3e;          /* orange plus profond */
    --acc-soft:#f6e3cf;      /* halo orange doux */
    --he:#6f9e7a;            /* vert sauge (HE) */
    --he-bg:#eef5ee;         /* fond vert très doux */
    --rec:#b88a4a;           /* bronze doux (recettes) */
    --rec-bg:#f7efe0;        /* fond bronze doux */
    --alert:#b07a52;         /* terracotta adouci (au lieu du rouge) */
    --alert-bg:#f7ece2;      /* fond terracotta doux */
    --warn:#c97a3e;          /* pour échéances sensibles */
    --safe:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0; background:var(--bg); overscroll-behavior-y:none}
  body{font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:var(--txt);
    font-size:16px; line-height:1.5; padding:calc(.6rem + var(--safe)) .75rem 6rem;
    max-width:640px; margin-inline:auto; -webkit-font-smoothing:antialiased}

  /* Bandeau supérieur */
  header{position:sticky; top:0; z-index:10; background:var(--bg); margin:0 -.75rem;
    padding:.6rem .9rem calc(.6rem + var(--safe)); border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; gap:.6rem}
  header .ttl{display:flex; align-items:center; gap:.55rem}
  header .logo{width:32px; height:32px; border-radius:9px; object-fit:cover}
  header h1{font-size:1.04rem; margin:0; font-weight:800; letter-spacing:.01em; color:var(--acc2)}
  header .day{font-size:.76rem; color:var(--mut); margin-top:.05rem; text-transform:capitalize}
  #prog{font-size:.72rem; color:var(--mut); text-align:right; min-width:4.5rem; font-variant-numeric:tabular-nums}
  .bar{height:6px; background:var(--card2); border-radius:4px; overflow:hidden; margin-top:.3rem; width:5rem}
  .bar i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--acc),var(--acc2)); transition:width .3s}

  /* Sections */
  .sec{margin:.7rem 0 0; background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden;
    box-shadow:0 1px 3px rgba(180,140,80,.06)}
  .sec>summary{list-style:none; cursor:pointer; padding:.85rem 1rem; display:flex; align-items:center; gap:.55rem;
    font-weight:700; font-size:.93rem; color:var(--txt)}
  .sec>summary::-webkit-details-marker{display:none}
  .sec>summary .chev{margin-left:auto; transition:transform .2s; color:var(--mut); font-size:.7rem}
  .sec[open]>summary .chev{transform:rotate(90deg)}
  .sec[open]>summary{border-bottom:1px solid var(--line)}
  .sec .cnt{font-size:.7rem; color:var(--mut); font-weight:600; margin-left:auto; margin-right:.5rem}
  .sec.empty{display:none}

  /* Items */
  ul.lst{list-style:none; margin:0; padding:0}
  .it{display:flex; align-items:flex-start; gap:.7rem; padding:.8rem 1rem; border-top:1px solid var(--line);
    cursor:pointer; min-height:54px; transition:opacity .25s, transform .25s, max-height .3s, padding .3s, margin .3s, background .2s;
    overflow:hidden; max-height:150px}
  .it:first-child{border-top:none}
  .it .t{flex:1; font-size:.91rem; padding-top:.05rem}
  .it .t b{font-weight:700}
  .it .t .sub{display:block; color:var(--mut); font-size:.77rem; margin-top:.14rem}
  .it .h{display:inline-block; min-width:2.5rem; font-variant-numeric:tabular-nums; color:var(--acc2);
    font-weight:700; font-size:.8rem; margin-right:.35rem}
  .box{flex:0 0 auto; width:30px; height:30px; border:2px solid var(--line); border-radius:9px;
    display:grid; place-items:center; font-size:1rem; color:transparent; transition:.15s; margin-top:.02rem; background:var(--card)}
  .it.done .box{background:var(--acc); border-color:var(--acc); color:#fff}
  .it.today .box{border-color:var(--acc); background:var(--acc-soft)}
  .it.removing{opacity:0; transform:translateX(20px); max-height:0; padding-top:0; padding-bottom:0; margin:0; border-top-color:transparent}

  /* Types : HE (sauge), alerte (terracotta), recette (bronze) */
  .it.he{background:var(--he-bg)}
  .it.he .box{border-color:var(--he)}
  .it.he .h{color:var(--he)}
  .it.he.done .box{background:var(--he); border-color:var(--he); color:#fff}
  .it.he .t b{color:var(--he)}

  .it.alerte{background:var(--alert-bg)}
  .it.alerte .box{border-color:var(--alert); background:var(--alert-bg)}
  .it.alerte .t b{color:var(--alert)}
  .it.alerte .box::after{content:"•"; color:var(--alert); font-weight:900; font-size:1.3rem}
  .it.alerte.done .box{background:var(--alert); border-color:var(--alert)}
  .it.alerte.done .box::after{color:#fff}

  .it.recette{background:var(--rec-bg)}
  .it.recette .box{border-color:var(--rec); background:var(--rec-bg)}
  .it.recette .t b{color:var(--rec)}
  .it.recette .box::after{content:"✎"; color:var(--rec); font-size:.85rem}
  .it.recette.done .box{background:var(--rec); border-color:var(--rec); color:#fff}
  .it.recette.done .box::after{color:#fff}

  /* Ligne de clôture */
  .close-row{margin:.9rem .9rem 0; background:linear-gradient(135deg,var(--acc-soft),var(--card2));
    border:1px solid var(--acc); border-radius:14px; overflow:hidden}
  .close-row .it{border-top:none}
  .close-row .it .box{border-color:var(--acc)}
  .close-row .it.done .box{background:var(--acc); border-color:var(--acc); color:#fff}
  .close-hint{padding:.55rem 1rem .7rem; font-size:.74rem; color:var(--mut); text-align:center}

  /* Écran journée terminée */
  #done-screen{display:none; text-align:center; padding:3rem 1.5rem}
  #done-screen .big{font-size:3.4rem; margin-bottom:.5rem}
  #done-screen h2{font-size:1.3rem; margin:.3rem 0; color:var(--acc2)}
  #done-screen p{color:var(--mut); font-size:.9rem; margin:.4rem 0}
  #done-screen .next{margin-top:1.5rem; padding:1rem 1.2rem; background:var(--card); border:1px solid var(--line);
    border-radius:12px; display:inline-block}
  #done-screen .next b{color:var(--acc2)}

  /* Échéances */
  .echeance{display:flex; gap:.6rem; padding:.65rem 1rem; border-top:1px solid var(--line); font-size:.8rem}
  .echeance:first-child{border-top:none}
  .echeance .d{color:var(--acc2); font-weight:700; min-width:5rem; font-size:.74rem}
  .echeance.warn .d{color:var(--warn)}

  /* Barre bas */
  .bot{position:fixed; bottom:0; left:0; right:0; background:var(--bg); border-top:1px solid var(--line);
    padding:.55rem 1rem calc(.55rem + env(safe-area-inset-bottom,0px)); display:flex; gap:.6rem;
    max-width:640px; margin-inline:auto}
  .bot button{flex:1; padding:.78rem; border:1px solid var(--line); border-radius:10px; background:var(--card);
    color:var(--txt); font-size:.84rem; font-weight:700; cursor:pointer}
  .bot button:active{background:var(--card2)}

  /* Bannière install */
  .install-banner{display:none; margin:.7rem 0 0; padding:.8rem 1rem; background:var(--acc-soft);
    border:1px solid var(--acc); border-radius:12px; font-size:.82rem}
  .install-banner b{color:var(--acc2)}
  .install-banner button{margin-top:.5rem; padding:.55rem .9rem; background:var(--acc); color:#fff;
    border:none; border-radius:8px; font-weight:700; font-size:.82rem; cursor:pointer; width:100%}
</style>
</head>
<body>

<header>
  <div class="ttl">
    <img class="logo" src="./icons/icon-192.png" alt="">
    <div>
      <h1>Mémo Santé</h1>
      <div class="day" id="hd-day">—</div>
    </div>
  </div>
  <div>
    <div id="prog">0/0</div>
    <div class="bar"><i id="bar"></i></div>
  </div>
</header>

<div id="install-banner" class="install-banner">
  <b>📌 Installe l'appli</b> pour l'avoir en icône sur ton bureau (menu Chrome ⋮ → <i>Installer l'application</i>).
  <button id="btn-install">Installer maintenant</button>
</div>

<main id="app"></main>

<div id="done-screen">
  <div class="big">🌙</div>
  <h2>Journée clôturée</h2>
  <p id="done-msg">Bien joué. Repose-toi.</p>
  <div class="next">À demain<br><b id="next-date">—</b></div>
</div>

<div class="bot">
  <button onclick="resetDay()">↻ Réinitialiser le jour</button>
  <button class="pri" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Haut</button>
</div>

<script src="./routine.js"></script>
<script>
/* ============================================================
   LOGIQUE APP — charge les données depuis routine.js
   ============================================================ */
let today = new Date(); today.setHours(0,0,0,0);
let key = today.toISOString().slice(0,10);

function frDate(d){ return d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}); }
function loadDone(){ try{return JSON.parse(localStorage.getItem("done-"+key))||{};}catch(e){return{}} }
function saveDone(s){ try{localStorage.setItem("done-"+key, JSON.stringify(s));}catch(e){} }
function isClosed(){ return localStorage.getItem("closed-"+key)==="1"; }
function setClosed(){ try{localStorage.setItem("closed-"+key,"1");}catch(e){} }

const app = document.getElementById("app");
const doneScreen = document.getElementById("done-screen");

function buildItemHTML(it, idx){
  const cls = ["it"];
  if(it.type) cls.push(it.type);
  if(it.today) cls.push("today");
  const h = it.h ? `<span class="h">${it.h}</span>` : "";
  const sub = it.sub ? `<span class="sub">${it.sub}</span>` : "";
  const icon = it.type==="alerte" ? "" : (it.type==="recette" ? "" : "✓");
  return `<li class="it ${cls.join(" ")}" data-idx="${idx}">
    <span class="box">${icon}</span>
    <span class="t">${h}<b>${it.t}</b>${sub}</span>
  </li>`;
}

function render(){
  const dow = today.getDay();
  const sections = routinePour(dow);

  document.getElementById("hd-day").textContent = frDate(today);

  if(isClosed()){
    app.style.display="none";
    doneScreen.style.display="block";
    const nd = new Date(today); nd.setDate(nd.getDate()+1);
    document.getElementById("next-date").textContent = frDate(nd);
    document.getElementById("done-msg").textContent = "Journée du "+frDate(today)+" archivée.";
    return;
  }
  app.style.display="block";
  doneScreen.style.display="none";

  let html="";
  let globalIdx=0;
  sections.forEach(sec=>{
    html += `<details class="sec" ${sec.open?"open":""}><summary>${sec.titre}<span class="cnt" data-cnt></span><span class="chev">▶</span></summary><ul class="lst">`;
    sec.items.forEach(it=>{
      html += buildItemHTML(it, globalIdx++);
    });
    html += `</ul></details>`;
  });

  // Échéances
  if(typeof ECHEANCES !== "undefined" && ECHEANCES.length){
    html += `<details class="sec"><summary>📅 Échéances<span class="chev">▶</span></summary>`;
    ECHEANCES.forEach(e=>{
      html += `<div class="echeance ${e.warn?"warn":""}"><span class="d">${e.date}</span><span>${e.t}</span></div>`;
    });
    html += `</details>`;
  }

  // Ligne de clôture
  html += `<div class="close-row">
    <ul class="lst"><li class="it" data-close="1">
      <span class="box">✓</span>
      <span class="t"><b>✅ Journée terminée — clôturer</b><span class="sub">Coche ici pour passer au jour suivant (même si tout n'est pas coché).</span></span>
    </li></ul>
    <div class="close-hint">Dernière action du jour.</div>
  </div>`;

  app.innerHTML = html;

  const done = loadDone();
  document.querySelectorAll(".it").forEach(el=>{
    const idx = el.dataset.idx;
    const close = el.dataset.close;
    const id = close ? "close" : idx;
    if(done[id]){
      el.classList.add("done");
      if(!close) el.classList.add("removing");
    }
  });

  document.querySelectorAll(".it").forEach(el=>{
    el.addEventListener("click", ()=> onItemClick(el));
  });

  updateCounts();
  updateProg();
}

function onItemClick(el){
  if(el.classList.contains("removing")) return;
  const idx = el.dataset.idx;
  const close = el.dataset.close==="1";
  const done = loadDone();

  if(close){
    el.classList.add("done");
    done["close"]=1; saveDone(done);
    setTimeout(()=>{
      setClosed();
      render();
      window.scrollTo({top:0,behavior:"smooth"});
    }, 450);
    return;
  }

  el.classList.add("done");
  done[idx]=1; saveDone(done);
  updateCounts();
  setTimeout(()=>{ el.classList.add("removing"); }, 280);
  updateProg();
}

function updateCounts(){
  document.querySelectorAll(".sec").forEach(sec=>{
    const items = sec.querySelectorAll(".it");
    const remaining = sec.querySelectorAll(".it:not(.removing):not(.done)").length;
    const cnt = sec.querySelector("[data-cnt]");
    if(cnt) cnt.textContent = remaining ? remaining+" restant(s)" : "✓";
    sec.classList.toggle("empty", remaining===0 && items.length>0 && sec.querySelectorAll(".it.removing").length===items.length);
  });
}

function updateProg(){
  const all = document.querySelectorAll(".it:not([data-close]):not(.alerte):not(.recette)");
  const doneN = document.querySelectorAll(".it.done:not([data-close]):not(.alerte):not(.recette)");
  const total = all.length;
  const pct = total?Math.round(doneN.length/total*100):0;
  document.getElementById("prog").textContent = doneN.length+"/"+total;
  document.getElementById("bar").style.width = pct+"%";
}

function resetDay(){
  if(!confirm("Réinitialiser la journée ? Les cochages du jour seront effacés.")) return;
  try{ localStorage.removeItem("done-"+key); localStorage.removeItem("closed-"+key); }catch(e){}
  render();
}

/* Installation PWA */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt", e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById("install-banner").style.display="block";
});
document.getElementById("btn-install").addEventListener("click", async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById("install-banner").style.display="none";
});

/* Service Worker */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("./sw.js").catch(()=>{});
  });
}

/* Vérif changement de date (passé minuit) */
setInterval(()=>{
  const now = new Date(); now.setHours(0,0,0,0);
  if(now.getTime() !== today.getTime()){
    today = now; key = today.toISOString().slice(0,10);
    render();
  }
}, 60000);

render();
</script>
</body>
</html>
